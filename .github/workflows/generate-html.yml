name: Generate HTML & Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'UBL-2.5-JSON-Syntax-Binding.xml'
      - 'convert_to_html.py'
      - 'db/**'
      - '.github/workflows/generate-html.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Download Saxon HE
        run: |
          mkdir -p utilities/saxon9he
          curl -fsSL -o utilities/saxon9he/saxon9he.jar \
            "https://repo1.maven.org/maven2/net/sf/saxon/Saxon-HE/9.8.0-15/Saxon-HE-9.8.0-15.jar"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate HTML from DocBook XML
        run: python convert_to_html.py

      - name: Deploy to gh-pages branch
        run: |
          cp UBL-2.5-JSON-Syntax-Binding.html /tmp/index.html
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan gh-pages-tmp
          git rm -rf .
          cp /tmp/index.html index.html
          touch .nojekyll
          git add index.html .nojekyll
          git commit -m "Deploy generated HTML"
          git push origin gh-pages-tmp:gh-pages --force
